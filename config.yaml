# 杀手锏交易系统 v1.0.0 Stable - 配置模板

# =============================================================================
# 系统配置
# =============================================================================
system:
  name: "杀手锏交易系统"
  version: "1.0.0-stable"
  environment: "production"  # development | staging | production
  log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR

# =============================================================================
# 交易配置
# =============================================================================
trading:
  symbol: "BTCUSDT"
  initial_capital: 100000.0
  position_size: 0.1  # 仓位大小（占资金比例）
  max_positions: 3  # 最大同时持仓数
  slippage_bps: 5.0  # 滑点（基点）
  commission_bps: 10.0  # 手续费（基点）

# =============================================================================
# 策略配置
# =============================================================================
strategy:
  # MA趋势策略
  ma_trend:
    enabled: true
    fast_period: 12
    slow_period: 26
    weight: 0.3

  # 订单流策略
  orderflow:
    enabled: true
    depth: 20
    weight: 0.3

  # 波动率策略
  volatility:
    enabled: true
    period: 20
    weight: 0.2

  # RSI策略
  rsi:
    enabled: true
    period: 14
    overbought: 70
    oversold: 30
    weight: 0.2

# =============================================================================
# 风控配置
# =============================================================================
risk:
  # 止损配置
  stop_loss:
    enabled: true
    atr_multiplier: 2.0  # ATR倍数
    fixed_percent: 0.05  # 固定百分比

  # 止盈配置
  take_profit:
    enabled: true
    atr_multiplier: 3.0
    fixed_percent: 0.10

  # 仓位管理
  position_management:
    max_risk_per_trade: 0.02  # 单笔最大风险
    max_daily_loss: 0.05  # 日最大亏损
    max_drawdown: 0.20  # 最大回撤

  # VaR风险价值
  var:
    confidence_level: 0.95  # 置信水平
    window_size: 100  # 窗口大小

# =============================================================================
# 扫描配置
# =============================================================================
scanner:
  enabled: true
  interval_seconds: 60  # 扫描间隔（秒）
  symbols:
    - "BTCUSDT"
    - "ETHUSDT"
    - "BNBUSDT"

# =============================================================================
# 策略实验室配置
# =============================================================================
strategy_lab:
  enabled: true
  # 种群配置
  population_size: 100
  generations: 50
  mutation_rate: 0.1
  crossover_rate: 0.7
  elite_size: 10

  # 自动进化
  auto_evolution:
    enabled: false  # v1.0.0 Stable默认关闭
    schedule: "0 22 * * 5"  # 每周五22:00 UTC

  # 回测配置
  backtest:
    initial_capital: 100000.0
    slippage_bps: 5.0
    commission_bps: 10.0
    position_size: 0.1

# =============================================================================
# 元学习控制器配置
# =============================================================================
meta_controller:
  enabled: false  # v1.0.0 Stable默认关闭
  # 状态空间
  state_dim: 12
  action_dim: 7

  # 训练参数
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2

  # 安全护栏
  action_limits:
    ma_trend: [-0.1, 0.1]
    orderflow: [-0.1, 0.1]
    volatility: [-0.1, 0.1]
    rsi: [-0.1, 0.1]
    stop_loss: [-0.2, 0.2]
    position_size: [-0.2, 0.2]
    scan_interval: [-5.0, 5.0]

# =============================================================================
# 订单簿配置
# =============================================================================
orderbook:
  enabled: false  # v1.0.0 Stable默认关闭
  depth: 20
  update_interval_ms: 100

# =============================================================================
# 异常检测配置
# =============================================================================
anomaly_detection:
  enabled: true
  # 检测方法: threshold | isolation_forest
  method: "threshold"  # v1.0.0 Stable使用阈值检测

  # 阈值配置
  thresholds:
    volatility: 0.05
    drawdown: 0.20
    latency: 1000.0
    error_rate: 0.10
    cpu_usage: 90.0
    memory_usage: 90.0

  # 告警配置
  alerts:
    enabled: true
    min_severity: "WARNING"  # INFO | WARNING | ERROR | CRITICAL

# =============================================================================
# 事件总线配置
# =============================================================================
event_bus:
  enabled: true
  # 存储模式: memory | redis
  storage_mode: "memory"  # v1.0.0 Stable使用内存模式

  # 事件持久化
  persistence:
    enabled: false
    path: "data/events.db"

# =============================================================================
# 日志配置
# =============================================================================
logging:
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # 日志文件
  file:
    enabled: true
    path: "logs/trading_system.log"
    max_size_mb: 10
    backup_count: 5

  # 控制台输出
  console:
    enabled: true

# =============================================================================
# 数据配置
# =============================================================================
data:
  # 历史数据
  historical:
    source: "local"  # local | binance_api
    path: "assets/data"

  # 实时数据
  realtime:
    source: "mock"  # mock | binance_websocket

# =============================================================================
# 监控配置
# =============================================================================
monitoring:
  enabled: true

  # 健康检查
  health_check:
    interval_seconds: 300  # 5分钟

  # 性能监控
  performance:
    enabled: true
    history_size: 1000

# =============================================================================
# 测试配置
# =============================================================================
testing:
  enabled: false  # 测试模式默认关闭

  # 测试数据
  test_data:
    symbol: "BTCUSDT"
    n_samples: 1000
    frequency: "1m"
