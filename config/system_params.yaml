# 系统级硬编码参数配置化
# 用法: from scripts.config_manager import ConfigManager; cfg = ConfigManager(); params = cfg.get_system_params()
# 文档: scripts.config_manager.ConfigManager.get_system_params()

version: "v5.3.7"

# ===== 风控参数 =====
risk:
  max_position_pct: 0.10          # 最大单品种仓位 10%
  max_single_loss_pct: 0.02      # 单笔最大亏损 2%
  trailing_activation_pct: 0.005  # 追踪止损激活盈利百分比 0.5%
  trailing_min_pct: 0.003         # 追踪止损最小回调 0.3%
  drawdown_warning_pct: 0.85      # 回撤警告阈值 85% of limit
  drawdown_high_pct: 0.90        # 回撤高危阈值 90% of limit
  max_drawdown_limit: 0.20       # 最大总回撤限制 20%
  circuit_breaker_threshold: 0.03  # 熔断阈值 3%
  correlation_max: 0.85           # 最大相关品种配置权重

# ===== 指标参数 =====
indicators:
  atr_period: 14                  # ATR 计算周期
  atr_sl_multiplier: 1.5          # ATR 止损倍数
  atr_tp_multiplier: 3.0          # ATR 止盈倍数
  trailing_stop_atr: 1.0         # 追踪止损 ATR 倍数
  rsi_period: 14                 # RSI 周期
  rsi_oversold: 30              # RSI 超卖阈值
  rsi_overbought: 70             # RSI 超买阈值
  bb_period: 20                  # 布林带周期
  bb_std: 2.0                    # 布林带标准差倍数
  volatility_p90: 0.05            # ATR/Price > 5% 为极端波动

# ===== 执行参数 =====
execution:
  default_slippage_bps: 5        # 默认滑点 5bps
  default_commission_bps: 10     # 默认手续费 10bps
  order_timeout_seconds: 30       # 订单超时秒数
  max_retry: 3                   # 最大重试次数
  position_cleanup_threshold: 1e-8  # 仓位清理阈值 (float safe)

# ===== EV 过滤参数 =====
ev_filter:
  min_expected_value: 0.01       # 最小期望值阈值
  min_confidence: 0.50           # 最小置信度
  min_risk_reward_ratio: 1.5     # 最小盈亏比
  max_fee_impact_pct: 0.005      # 最大费率影响 0.5%

# ===== HRP 参数 =====
hrp:
  correlation_threshold: 0.95     # 相关性裁剪阈值
  min_weight_pct: 0.01           # 最小权重 1%
  rebalance_threshold_pct: 0.05  # 再平衡阈值 5%
  max_weight_pct: 0.50           # 最大权重 50%

# ===== Hawkes 冲击模型 =====
hawkes:
  alpha_default: 0.10            # 自激系数 alpha
  beta_default: 1.00            # 衰减率 beta
  mu_default: 0.01              # 基础强度 mu
  decay_halflife_seconds: 30    # 衰减半衰期秒数

# ===== BO 优化参数 =====
bayesian_optimizer:
  n_iter: 30                    # BO 迭代次数
  init_random_points: 5         # 初始随机探索点数
  noise: 0.01                   # 噪声标准差
  verbose: false                # 是否输出详细日志

# ===== 过拟合检测 =====
overfitting:
  cscv_n_splits: 10             # CSCV 分组数
  cscv_test_ratio: 0.25         # 每组测试比例
  pbo_n_retreats: 100           # PBO 重采样次数
  sharpe_ref_lag: 36             # DSR 参考夏普 lag
  sharpe_n: 12                  # DSR 年化月数
  sharpe_target: 1.0            # DSR 目标夏普

# ===== 元学习 MAML =====
maml:
  inner_lr: 0.01                # 内循环学习率
  outer_lr: 0.001               # 外循环学习率
  n_inner_steps: 5               # 内循环步数
  adaptation_steps: 3            # 快速适应步数
  meta_batch_size: 32            # 元批次大小
  convergence_epsilon: 0.001     # 收敛阈值

# ===== 数值安全阈值 =====
numerical:
  float_zero: 1e-10             # 浮点零值比较 epsilon
  price_zero: 1e-8              # 价格零值 epsilon
  correlation_zero: 1e-10       # 相关系数零值 epsilon
  volume_zero: 1e-10            # 成交量零值 epsilon
  position_zero: 1e-8           # 仓位零值 epsilon
  safe_divisor: 1e-10          # 安全除数 epsilon
