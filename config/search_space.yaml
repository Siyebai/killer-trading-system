# =============================================================================
# 贝叶斯优化参数搜索空间配置
# Stage 3 产出：定义所有可优化参数范围、类型、优先级
# =============================================================================

# 基础参数搜索空间
parameters:

  # ===== HRP相关参数 =====
  hrp_distance_metric:
    type: categorical
    options: [correlation, euclidean, mahalanobis]
    default: correlation
    priority: medium
    description: "HRP层次聚类的距离度量方式"
    tags: [portfolio, hrp]

  hrp_linkage_method:
    type: categorical
    options: [single, complete, average, ward]
    default: average
    priority: medium
    description: "层次聚类的链接方法"
    tags: [portfolio, hrp]

  # ===== 市场冲击参数 =====
  impact_model_type:
    type: categorical
    options: [sqrt, ac, hawkes]
    default: sqrt
    priority: high
    description: "冲击模型类型"
    tags: [execution, impact]

  impact_eta:
    type: continuous
    low: 0.05
    high: 2.0
    default: 0.5
    priority: high
    description: "流动性系数(平方根/Hawkes模型)"
    tags: [execution, impact]

  impact_gamma:
    type: continuous
    low: 0.01
    high: 0.5
    default: 0.05
    priority: medium
    description: "AC模型永久冲击系数"
    tags: [execution, impact]

  impact_alpha:
    type: continuous
    low: 0.3
    high: 0.9
    default: 0.6
    priority: medium
    description: "AC模型临时冲击指数"
    tags: [execution, impact]

  # ===== Hawkes过程参数 =====
  hawkes_mu:
    type: continuous
    low: 0.1
    high: 2.0
    default: 0.5
    priority: low
    description: "Hawkes基准强度"
    tags: [execution, hawkes]

  hawkes_alpha:
    type: continuous
    low: 0.0
    high: 0.9
    default: 0.3
    priority: low
    description: "Hawkes自激系数"
    tags: [execution, hawkes]

  hawkes_beta:
    type: continuous
    low: 0.5
    high: 5.0
    default: 1.0
    priority: low
    description: "Hawkes衰减速率"
    tags: [execution, hawkes]

  # ===== 信号阈值参数 =====
  signal_threshold_long:
    type: continuous
    low: 0.3
    high: 0.9
    default: 0.6
    priority: high
    description: "多头信号确认阈值"
    tags: [signal, threshold]

  signal_threshold_short:
    type: continuous
    low: -0.9
    high: -0.3
    default: -0.6
    priority: high
    description: "空头信号确认阈值"
    tags: [signal, threshold]

  signal_confirmation_bars:
    type: discrete
    low: 1
    high: 5
    default: 2
    priority: medium
    description: "信号确认所需K线数"
    tags: [signal, threshold]

  # ===== 止损止盈参数 =====
  stop_loss_atr_multiplier:
    type: continuous
    low: 0.5
    high: 4.0
    default: 2.0
    priority: high
    description: "止损ATR倍数"
    tags: [risk, stop_loss]

  take_profit_atr_multiplier:
    type: continuous
    low: 1.0
    high: 8.0
    default: 3.0
    priority: high
    description: "止盈ATR倍数"
    tags: [risk, take_profit]

  trailing_stop_atr:
    type: continuous
    low: 0.5
    high: 3.0
    default: 1.5
    priority: medium
    description: "移动止损ATR倍数"
    tags: [risk, trailing]

  trailing_activation_pct:
    type: continuous
    low: 0.01
    high: 0.10
    default: 0.03
    priority: medium
    description: "移动止损激活利润比例"
    tags: [risk, trailing]

  # ===== 仓位管理参数 =====
  base_position_pct:
    type: continuous
    low: 0.01
    high: 0.15
    default: 0.05
    priority: high
    description: "基础仓位比例"
    tags: [position, sizing]

  kelly_fraction:
    type: continuous
    low: 0.1
    high: 1.0
    default: 0.5
    priority: medium
    description: "凯利系数(仓位缩放因子)"
    tags: [position, kelly]

  max_correlation_threshold:
    type: continuous
    low: 0.3
    high: 0.9
    default: 0.6
    priority: medium
    description: "最大仓位相关度阈值"
    tags: [position, correlation]

  # ===== 风险平价参数 =====
  risk_parity_method:
    type: categorical
    options: [erc, herc, ivp, auto]
    default: erc
    priority: medium
    description: "风险平价方法"
    tags: [portfolio, risk_parity]

  erc_max_weight:
    type: continuous
    low: 0.10
    high: 0.50
    default: 0.30
    priority: medium
    description: "ERC单品种最大权重"
    tags: [portfolio, risk_parity]

  # ===== 状态识别参数 =====
  trend_confirmation_window:
    type: discrete
    low: 5
    high: 50
    default: 20
    priority: medium
    description: "趋势确认窗口"
    tags: [market_state, trend]

  range_break_threshold:
    type: continuous
    low: 0.8
    high: 2.0
    default: 1.3
    priority: medium
    description: "区间突破ATR倍数"
    tags: [market_state, breakout]

  volatility_lookback:
    type: discrete
    low: 10
    high: 60
    default: 20
    priority: low
    description: "波动率回看周期"
    tags: [market_state, volatility]

  # ===== 自适应阈值参数 =====
  adaptive_threshold_alpha:
    type: continuous
    low: 0.01
    high: 0.10
    default: 0.03
    priority: medium
    description: "自适应阈值平滑系数"
    tags: [threshold, adaptive]

  min_signal_strength:
    type: continuous
    low: 0.1
    high: 0.8
    default: 0.4
    priority: high
    description: "最小信号强度阈值"
    tags: [signal, threshold]

  # ===== 过拟合检测参数 =====
  overfit_penalty_weight:
    type: continuous
    low: 0.0
    high: 2.0
    default: 0.5
    priority: medium
    description: "过拟合惩罚权重"
    tags: [overfitting, validation]

  min_sample_size:
    type: discrete
    low: 30
    high: 200
    default: 50
    priority: medium
    description: "最小样本量要求"
    tags: [overfitting, validation]


# =============================================================================
# 优化场景配置
# =============================================================================

scenarios:

  # 场景1: 激进高收益
  aggressive:
    description: "追求高收益,允许较大回撤"
    objectives:
      primary: sharpe_ratio
      secondary: annual_return
      constraints:
        max_drawdown: 0.25
        min_trades: 30
    param_overrides:
      base_position_pct: 0.10
      kelly_fraction: 0.75
      signal_threshold_long: 0.5
      stop_loss_atr_multiplier: 2.5

  # 场景2: 稳健均衡
  balanced:
    description: "平衡收益与风险,适合中等风险偏好"
    objectives:
      primary: sharpe_ratio
      secondary: calmar_ratio
      constraints:
        max_drawdown: 0.15
        min_trades: 50
    param_overrides:
      base_position_pct: 0.05
      kelly_fraction: 0.5
      signal_threshold_long: 0.65
      stop_loss_atr_multiplier: 1.5

  # 场景3: 低回撤保守
  conservative:
    description: "最小化回撤,适合保守型"
    objectives:
      primary: calmar_ratio
      secondary: sharpe_ratio
      constraints:
        max_drawdown: 0.10
        min_trades: 30
    param_overrides:
      base_position_pct: 0.03
      kelly_fraction: 0.3
      signal_threshold_long: 0.75
      stop_loss_atr_multiplier: 1.2
      trailing_stop_atr: 1.0

  # 场景4: 高频交易
  high_frequency:
    description: "高频信号,快速止损"
    objectives:
      primary: sharpe_ratio
      secondary: trade_frequency
      constraints:
        max_drawdown: 0.20
        min_trades: 100
    param_overrides:
      signal_confirmation_bars: 1
      trailing_stop_atr: 0.8
      stop_loss_atr_multiplier: 1.0
      impact_model_type: hawkes

  # 场景5: 组合优化
  portfolio_optimization:
    description: "多品种组合优化,使用HRP和风险平价"
    objectives:
      primary: sharpe_ratio
      secondary: portfolio_diversification
      constraints:
        max_drawdown: 0.20
        min_trades: 50
    param_overrides:
      risk_parity_method: erc
      max_correlation_threshold: 0.5
      hrp_distance_metric: correlation
      erc_max_weight: 0.25


# =============================================================================
# 约束条件
# =============================================================================

constraints:

  # 硬约束(必须满足,违反则参数无效)
  hard:
    - "base_position_pct * kelly_fraction <= 0.15"
    - "stop_loss_atr_multiplier < take_profit_atr_multiplier"
    - "signal_threshold_long > abs(signal_threshold_short)"
    - "erc_max_weight >= base_position_pct"
    - "min_signal_strength < signal_threshold_long"

  # 软约束(优化时尽量满足)
  soft:
    - "trailing_stop_atr < stop_loss_atr_multiplier * 0.8"
    - "impact_eta <= impact_gamma * 10"
    - "hrp_linkage_method != single"


# =============================================================================
# 优化配置
# =============================================================================

optimization:
  n_iterations: 30          # 贝叶斯优化迭代次数
  n_random_starts: 5        # 初始随机探索次数
  n_jobs: 1                 # 并行任务数
  verbose: 1                # 日志详细程度

  # 采集函数选择
  acquisition:
    primary: ei             # Expected Improvement
    alternatives: [ucb, pi]
    exploration_weight: 0.01 # UCB探索因子

  # 代理模型
  surrogate:
    type: gaussian_process  # 或 random_forest
    kernel: RBF + Constant
    normalize_y: true

  # 早停条件
  early_stopping:
    enabled: true
    patience: 5            # 连续5次无提升则停止
    min_improvement: 0.001  # 最小提升阈值


# =============================================================================
# 输出配置
# =============================================================================

output:
  save_path: "outputs/bayesopt/"
  save_history: true
  save_plots: true
  export_format: [json, yaml]

  # 报告内容
  report:
    include_params: true
    include_constraints: true
    include_convergence: true
    include_pareto_front: true
    top_n_results: 5
